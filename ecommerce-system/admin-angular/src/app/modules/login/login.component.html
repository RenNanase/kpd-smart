<div class="login-page">
  <div class="card">
    <h1 class="title">Sign in</h1>
    <p class="hint">
      Mock authentication — pick a role to test permissions. After sign-in you can also switch roles from the header.
      <strong>admin</strong> has full access;
      <strong>storekeeper</strong> can view products, update stock, and update order status;
      <strong>seller</strong> can use the dashboard, manage products and categories, and view orders.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field">
        <span class="label">Email</span>
        <input type="email" formControlName="email" autocomplete="username" />
        @if (form.controls.email.touched && form.controls.email.errors?.['required']) {
          <span class="error">Email is required.</span>
        }
        @if (form.controls.email.touched && form.controls.email.errors?.['email']) {
          <span class="error">Enter a valid email.</span>
        }
      </label>

      <label class="field">
        <span class="label">Password</span>
        <input type="password" formControlName="password" autocomplete="current-password" />
        @if (form.controls.password.touched && form.controls.password.errors?.['required']) {
          <span class="error">Password is required.</span>
        }
      </label>

      <label class="field">
        <span class="label">Role</span>
        <select formControlName="role">
          @for (r of roles; track r) {
            <option [value]="r">{{ r }}</option>
          }
        </select>
      </label>

      <button type="submit" class="submit" [disabled]="signingIn()">
        {{ signingIn() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>
  </div>
</div>
