<app-page-header
  title="Products"
  subtitle="Seller catalog: pricing, media, SKU, discounts, and ratings — stored in PostgreSQL via the API."
/>

@if (api.listError()) {
  <p class="list-banner">{{ api.listError() }}</p>
}

@if (canManageProducts()) {
  <div class="toolbar">
    <a routerLink="new" class="btn-primary">Add product</a>
  </div>
}

<app-data-table [columns]="columns" [rows]="api.products()">
  <ng-template #actions let-product>
    @if (canManageProducts()) {
      <a class="link" [routerLink]="[product.id, 'edit']">Edit</a>
      <button type="button" class="btn-danger" (click)="deleteProduct(product, $event)">
        Delete
      </button>
    } @else {
      <span class="muted">View only</span>
    }
  </ng-template>
</app-data-table>
